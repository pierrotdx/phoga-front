<div>tmp: {{ viewModel | json}}</div>
<div class="form-group">
    <label for="description">
        Description
        <input
            type="text"
            class="form-control"
            id="description"
            required
            [(ngModel)]="viewModel.description"
            name="description"
        >
    </label>
</div>
<div class="form-group">
    <label for="location">
        Location
        <input
            type="text"
            class="form-control"
            id="location"
            required
            [(ngModel)]="viewModel.location"
            name="location"
        >
    </label>
</div>
<div class="form-group">
    <label>Titles
    @for (title of viewModel.titles; track $index) {
        <input
        type="text"
        class="form-control"
        id="title-id"
        required
        [(ngModel)]="viewModel.location"
        name="location"
    >
    }
</label>
</div>
